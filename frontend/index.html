    <!-- Primäre Meta-Tags -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EEDC Community – PV-Anlagen Benchmark Deutschland" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "EEDC Community",
      "url": "https://energy.raunet.eu/",
      "description": "Anonyme Community-Statistiken für Photovoltaik-Anlagen in Deutschland. Benchmark nach Region, Anlagengröße und Ausstattung.",
      "inLanguage": "de-DE",
      "publisher": {
        "@type": "Organization",
        "name": "EEDC",
        "url": "https://supernova1963.github.io/eedc-homeassistant/"
      }
    }
    </script>

    <!-- Structured Data: Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "EEDC Community – PV-Anlagen Benchmark Deutschland",
      "description": "Anonymisierte Leistungsdaten von Photovoltaik-Anlagen in Deutschland. Enthält spezifische Erträge (kWh/kWp), Regionen, Speicher-, Wärmepumpen- und E-Auto-Statistiken.",
      "url": "https://energy.raunet.eu/",
      "inLanguage": "de-DE",
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "creator": {
        "@type": "Organization",
        "name": "EEDC Community"
      },
      "spatialCoverage": "Deutschland",
      "measurementTechnique": "Anonyme Selbstauskunft über EEDC Add-on oder EEDC Standalone",
      "variableMeasured": [
        "Spezifischer Jahresertrag kWh/kWp",
        "PV-Anlagengröße kWp",
        "Speicherkapazität kWh",
        "CO₂-Einsparung",
        "Wärmepumpen-JAZ",
        "E-Auto-Ladung"
      ]
    }
    </script>

    <div id="root"></div>
